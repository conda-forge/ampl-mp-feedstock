{% set name = "ampl-mp" %}
{% set version = "4.1.0" %}
{% set sha256 = "c75274fe2ef8b61f67826267e3c2cb339021c62d724659ab89a5b63c3959067d" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ version }}.tar.gz
  url: https://github.com/ampl/mp/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}
  patches:
    - disable_benchmark.patch
    - d03e486f98ad45b7ec2898480f943e9c846f2df0.patch  # [osx and arm64]

build:
  number: 0
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage('ampl-mp', max_pin='x.x') }}

requirements:
  build:
    - cmake
    - make  # [not win]
    - {{ compiler('fortran') }}
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - unixodbc

test:
  requires:
    - make  # [not win]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  files:
    - miniampl

about:
  home: http://ampl.github.io
  license: HPND
  license_file: LICENSE.rst
  summary: 'An open-source library for mathematical programming.'
  description: |
    Reusable high-performance .nl file reader which is up to 6x faster than
    the one provided by ASL
  doc_url: http://ampl.github.io
  dev_url: https://github.com/ampl/mp

extra:
  recipe-maintainers:
    - traversaro
    - pstjohn
